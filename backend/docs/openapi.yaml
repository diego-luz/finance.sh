  /transactions/bulk-delete:
    post:
      tags: [Transactions]
      summary: Remove vários lançamentos (soft delete)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkIDsRequest' }
      responses:
        '200':
          description: Quantidade removida
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/BulkResult' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /me/change-password:
    post:
      tags: [Account]
      summary: Altera a própria senha (re-autenticação via senha atual)
      description: >
        Exige a senha atual em `current_password`. Em sucesso, atualiza a senha,
        limpa `must_change_password` e revoga todas as sessões do usuário; para
        preservar a sessão atual, envie o refresh token bruto em
        `keep_refresh_token` (quando ausente TODAS as sessões são revogadas e o
        cliente deve refazer o login). Usado tanto no fluxo de troca obrigatória
        após provisionamento quanto em rotações normais de senha.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '200':
          description: Senha alterada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '401':
          description: Senha atual incorreta ou não autenticado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /me/sessions:
    get:
      tags: [Account]
      summary: Lista as sessões ativas do usuário
      description: >
        Sessões derivadas dos refresh tokens não revogados e não expirados. O
        hash do token nunca é exposto.
      responses:
        '200':
          description: Sessões ativas
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Session' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/sessions/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    delete:
      tags: [Account]
      summary: Revoga uma sessão do usuário
      responses:
        '200': { description: Sessão revogada }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/sessions/revoke-others:
    post:
      tags: [Account]
      summary: Revoga as demais sessões do usuário
      description: >
        Revoga todas as sessões ativas. Para preservar a sessão atual, envie o
        refresh token bruto em `keep_refresh_token`; quando omitido, TODAS as
        sessões são revogadas e o cliente deve refazer o login.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RevokeOtherSessionsRequest' }
      responses:
        '200':
          description: Quantidade revogada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/BulkResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /audit-logs:
    get:
      tags: [Auditoria]
      summary: Lista a trilha de auditoria (owner/admin)
      description: >
        Retorna os registros de auditoria da organização (ações sensíveis
        gravadas pelo middleware de auditoria), do mais recente ao mais antigo.
        Acesso restrito a owner/admin.
      parameters:
        - { name: action, in: query, schema: { type: string, enum: [POST, PUT, PATCH, DELETE] }, description: Método HTTP da ação (correspondência exata) }
        - { name: entity, in: query, schema: { type: string }, description: "Recurso afetado (primeiro segmento do path, ex.: accounts) — correspondência exata" }
        - { name: user_id, in: query, schema: { type: string, format: uuid }, description: Filtra pelo autor da ação }
        - { name: from, in: query, schema: { type: string, format: date }, description: Data inicial (YYYY-MM-DD ou RFC3339) sobre created_at }
        - { name: to, in: query, schema: { type: string, format: date }, description: Data final (YYYY-MM-DD ou RFC3339) sobre created_at }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        '200':
          description: Página de registros de auditoria
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/AuditLog' }
                      meta: { $ref: '#/components/schemas/PageMeta' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/stats:
    get:
      tags: [Admin]
      summary: Contadores globais da plataforma (super-admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Estatísticas globais
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/AdminStats' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/organizations:
    get:
      tags: [Admin]
      summary: Lista organizações (super-admin)
      security:
        - bearerAuth: []
      parameters:
        - { name: search, in: query, schema: { type: string }, description: Busca por nome/slug (ILIKE) }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        '200':
          description: Página de organizações
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/AdminOrg' }
                      meta: { $ref: '#/components/schemas/PageMeta' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/users:
    get:
      tags: [Admin]
      summary: Lista usuários (super-admin)
      security:
        - bearerAuth: []
      parameters:
        - { name: search, in: query, schema: { type: string }, description: Busca por nome/e-mail (ILIKE) }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        '200':
          description: Página de usuários
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/AdminUser' }
                      meta: { $ref: '#/components/schemas/PageMeta' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/users/{id}/disable:
    post:
      tags: [Admin]
      summary: Desativa um usuário (super-admin)
      description: >
        Bloqueia o login e revoga as sessões (refresh tokens) do usuário. Um
        super-admin não pode desativar a si mesmo nem o último super-admin.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200': { description: Usuário desativado }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Conflito (cannot_disable_self ou last_super_admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }

  /admin/users/{id}/enable:
    post:
      tags: [Admin]
      summary: Reativa um usuário (super-admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200': { description: Usuário reativado }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    orgHeader:
      type: apiKey
      in: header
      name: X-Organization-ID

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Requisição inválida
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    Unauthorized:
      description: Token ausente ou inválido
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    NotFound:
      description: Registro não encontrado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    Forbidden:
      description: Permissão insuficiente
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    ValidationError:
      description: Dados inválidos
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }

  schemas:
    Envelope:
      type: object
      properties:
        success: { type: boolean }
        data: {}
        error: { $ref: '#/components/schemas/ErrorBody' }
        meta: {}
    ErrorBody:
      type: object
      nullable: true
      properties:
        code: { type: string }
        message: { type: string }
        fields:
          type: object
          additionalProperties: { type: string }

    ImportPreview:
      type: object
      properties:
        format: { type: string, enum: [ofx, csv] }
        rows:
          type: array
          items: { $ref: '#/components/schemas/ImportRow' }
        summary: { $ref: '#/components/schemas/ImportSummary' }
    ImportRow:
      type: object
      properties:
        index: { type: integer, description: Posição 0-based na lista }
        date: { type: string, format: date-time }
        description: { type: string }
        amount: { type: integer, format: int64, description: Valor em centavos (positivo) }
        type: { type: string, enum: [income, expense] }
        external_id: { type: string, description: FITID (OFX) ou hash (CSV) }
        duplicate: { type: boolean }
        reason: { type: string, description: Motivo quando duplicate=true }
        suggested_category_id: { type: string, format: uuid, description: "Categoria sugerida pela categorização automática (regra/histórico); vazio quando nada combinou" }
    ImportSummary:
      type: object
      properties:
        total: { type: integer }
        new: { type: integer }
        duplicates: { type: integer }
    ImportCommitRequest:
      type: object
      required: [account_id, rows]
      properties:
        account_id: { type: string, format: uuid }
        category_id: { type: string, format: uuid, description: Categoria opcional aplicada a todos }
        rows:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/ImportCommitRow' }
    ImportCommitRow:
      type: object
      required: [date, description, amount, type]
      properties:
        date: { type: string, format: date-time }
        description: { type: string, maxLength: 200 }
        amount: { type: integer, format: int64, description: Valor em centavos (positivo) }
        type: { type: string, enum: [income, expense] }
        external_id: { type: string, maxLength: 120 }
    ImportCommitResult:
      type: object
      properties:
        created: { type: integer }
        skipped: { type: integer }

    SetupInitializeRequest:
      type: object
      required: [name, email, password, organization_name]
      description: Dados do primeiro super-admin + organização (first-boot).
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 72 }
        organization_name: { type: string, minLength: 2, maxLength: 120 }
        currency:
          type: string
          minLength: 3
          maxLength: 3
          description: "Moeda da organização (ISO-4217). Opcional; padrão BRL."
          example: BRL
    CreateOrgRequest:
      type: object
      required: [name]
      description: Criação self-service de organização adicional.
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        currency:
          type: string
          minLength: 3
          maxLength: 3
          description: "Moeda da organização (ISO-4217). Opcional; padrão BRL."
          example: BRL
    DataImportSummary:
      type: object
      description: Contagem por entidade importada por POST /me/import.
      properties:
        organization_id: { type: string, format: uuid, description: ID da nova organização criada }
        organization_name: { type: string }
        accounts: { type: integer }
        categories: { type: integer }
        contacts: { type: integer }
        credit_cards: { type: integer }
        budgets: { type: integer }
        goals: { type: integer }
        transactions: { type: integer }

    RegisterRequest:
      type: object
      required: [name, email, password, organization_name, accepted_terms]
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 72 }
        organization_name: { type: string, minLength: 2, maxLength: 120 }
        currency:
          type: string
          minLength: 3
          maxLength: 3
          description: >
            Moeda da organização (ISO-4217). Opcional; padrão BRL. Deve ser um
            código suportado (ver GET /currencies) — caso contrário 422.
          example: BRL
        accepted_terms:
          type: boolean
          description: LGPD — deve ser true para aceitar os termos de uso.
          enum: [true]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    MFAChallenge:
      type: object
      properties:
        mfa_required: { type: boolean, example: true }
        mfa_token: { type: string, description: Token de curta duração (5 min) para concluir o login em /auth/2fa/verify }
    TwoFactorVerifyRequest:
      type: object
      required: [mfa_token, code]
      properties:
        mfa_token: { type: string }
        code: { type: string, description: Código TOTP de 6 dígitos ou código de recuperação }
    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token: { type: string }
    ResendVerificationRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    TwoFactorCodeRequest:
      type: object
      required: [code]
      properties:
        code: { type: string, description: Código TOTP de 6 dígitos (ou de recuperação ao desativar) }
    TwoFactorSetup:
      type: object
      properties:
        secret: { type: string }
        otpauth_url: { type: string, description: URL otpauth:// para renderizar o QR code }
    TwoFactorEnable:
      type: object
      properties:
        recovery_codes:
          type: array
          items: { type: string }
          description: Códigos de recuperação de uso único (exibidos apenas uma vez)
    DeleteAccountRequest:
      type: object
      required: [password]
      properties:
        password: { type: string }
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password: { type: string, description: "Senha atual (re-autenticação)" }
        new_password: { type: string, minLength: 8, maxLength: 72 }
        keep_refresh_token:
          type: string
          description: >
            Refresh token bruto da sessão atual a ser preservada na revogação em
            massa. Quando ausente todas as sessões são revogadas.

    AuthEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - properties:
            data: { $ref: '#/components/schemas/AuthResponse' }
    AuthResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in: { type: integer, format: int64, description: Validade do access token em segundos }
        user: { $ref: '#/components/schemas/User' }
        organization: { $ref: '#/components/schemas/Organization' }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string }
        email_verified: { type: boolean }
        two_factor_enabled: { type: boolean }
        avatar_url: { type: string }
        super_admin: { type: boolean, description: "Indica se o usuário é super-administrador da plataforma (acesso ao back-office /admin). Papel de plataforma, distinto do RBAC por organização." }
        must_change_password: { type: boolean, description: "Quando true, o usuário foi provisionado pelo super-admin com uma senha inicial e precisa trocá-la no primeiro login (frontend força a UI de troca via POST /me/change-password)." }
    Organization:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        currency: { type: string }
        role: { type: string, enum: [owner, admin, member, viewer] }
    MeResponse:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        organizations:
          type: array
          items: { $ref: '#/components/schemas/Organization' }

    AdminStats:
      type: object
      properties:
        organizations: { type: integer, format: int64 }
        users: { type: integer, format: int64 }
        transactions: { type: integer, format: int64 }
    AdminOrgOwner:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string }
    AdminOrg:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        currency: { type: string }
        owner: { $ref: '#/components/schemas/AdminOrgOwner' }
        members: { type: integer, format: int64 }
        transactions: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
    AdminUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string }
        super_admin: { type: boolean }
        disabled: { type: boolean }
        email_verified: { type: boolean }
        created_at: { type: string, format: date-time }
        organizations:
          type: array
          items: { type: string }
          description: Nomes das organizações das quais o usuário é membro
    OrgUpdateRequest:
      type: object
      description: >
        Atualiza a organização ativa. Ambos os campos são opcionais; valor
        ausente/vazio mantém o atual. currency deve ser um código suportado.
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        currency:
          type: string
          minLength: 3
          maxLength: 3
          description: Moeda (ISO-4217) suportada. 422 quando não suportada.
          example: USD
    Currency:
      type: object
      properties:
        code: { type: string, description: Código ISO-4217, example: BRL }
        name: { type: string, description: Nome em pt-BR, example: Real brasileiro }
        symbol: { type: string, example: R$ }

    AccountRequest:
      type: object
      required: [name, type]
      properties:
        name: { type: string, maxLength: 120 }
        type: { type: string, enum: [bank, wallet, investment, credit_card] }
        initial_balance: { type: integer, format: int64, description: Saldo inicial em centavos }
        color: { type: string }
        icon: { type: string }
    Account:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string }
        initial_balance: { type: integer, format: int64 }
        balance: { type: integer, format: int64, description: Saldo atual calculado em centavos }
        color: { type: string }
        icon: { type: string }
        archived: { type: boolean }

    CategoryRequest:
      type: object
      required: [name, kind]
      properties:
        name: { type: string, maxLength: 120 }
        kind: { type: string, enum: [income, expense] }
        color: { type: string }
        icon: { type: string }
    Category:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        kind: { type: string }
        color: { type: string }
        icon: { type: string }

    CategoryRuleRequest:
      type: object
      required: [pattern, category_id]
      properties:
        pattern: { type: string, maxLength: 200, description: Palavra-chave/expressão comparada (case-insensitive) com a descrição }
        category_id: { type: string, format: uuid, description: Categoria a atribuir (deve ser da organização) }
        match_type: { type: string, enum: [contains, prefix, regex], default: contains }
        priority: { type: integer, default: 0, description: Maior vence quando várias regras combinam }
        active: { type: boolean, default: true }
    CategoryRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        pattern: { type: string }
        match_type: { type: string, enum: [contains, prefix, regex] }
        category_id: { type: string, format: uuid }
        category: { $ref: '#/components/schemas/Category' }
        priority: { type: integer }
        active: { type: boolean }
    SuggestResponse:
      type: object
      properties:
        category_id: { type: string, format: uuid, description: Presente quando há sugestão }
        source: { type: string, enum: [rule, history, none] }
        category: { $ref: '#/components/schemas/Category' }
    ApplyResult:
      type: object
      properties:
        updated: { type: integer, description: Transações categorizadas }

    RecurrenceRuleRequest:
      type: object
      required: [type, amount, description, account_id, frequency, start_date]
      properties:
        type: { type: string, enum: [income, expense] }
        amount: { type: integer, format: int64, description: Valor em centavos (positivo) }
        description: { type: string, maxLength: 200 }
        account_id: { type: string, format: uuid, description: Conta do lançamento (deve ser da organização) }
        category_id: { type: string, format: uuid, description: Categoria opcional (da organização) }
        contact_id: { type: string, format: uuid, description: Contato opcional (cliente/fornecedor da organização) }
        paid: { type: boolean, default: false, description: Estado pago aplicado a cada lançamento gerado }
        frequency: { type: string, enum: [daily, weekly, monthly, yearly] }
        interval: { type: integer, minimum: 1, default: 1, description: A cada N períodos }
        start_date: { type: string, format: date-time, description: Início (também a primeira next_run_date) }
        end_date: { type: string, format: date-time, description: Fim opcional; após ela a regra é desativada }
        max_occurrences: { type: integer, minimum: 0, default: 0, description: 0 = ilimitado }
        active: { type: boolean, default: true }
    RecurrenceRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [income, expense] }
        amount: { type: integer, format: int64 }
        description: { type: string }
        account_id: { type: string, format: uuid }
        category_id: { type: string, format: uuid }
        contact_id: { type: string, format: uuid }
        paid: { type: boolean }
        frequency: { type: string, enum: [daily, weekly, monthly, yearly] }
        interval: { type: integer }
        start_date: { type: string, format: date-time }
        end_date: { type: string, format: date-time }
        max_occurrences: { type: integer, description: 0 = ilimitado }
        occurrences_count: { type: integer, description: Geradas até agora }
        next_run_date: { type: string, format: date-time }
        active: { type: boolean }
        account:
          type: object
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
        category: { $ref: '#/components/schemas/Category' }
    RecurrenceRunResult:
      type: object
      properties:
        created: { type: integer, description: Lançamentos gerados }

    ContactRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 120 }
        type: { type: string, enum: [customer, supplier, both], default: both }
        document: { type: string, maxLength: 20, description: CPF ou CNPJ }
        email: { type: string, format: email }
        phone: { type: string, maxLength: 30 }
        notes: { type: string, maxLength: 500 }
    Contact:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [customer, supplier, both] }
        document: { type: string }
        email: { type: string }
        phone: { type: string }
        notes: { type: string }

    TagRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 60 }
        color: { type: string, maxLength: 9, description: "Cor hex (padrão #6b7280)" }
    Tag:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        color: { type: string }

    TransactionRequest:
      type: object
      required: [account_id, type, amount, description, date]
      properties:
        account_id: { type: string, format: uuid }
        category_id: { type: string, format: uuid }
        transfer_account_id: { type: string, format: uuid }
        contact_id: { type: string, format: uuid, description: Cliente/fornecedor associado }
        type: { type: string, enum: [income, expense, transfer] }
        amount: { type: integer, format: int64, description: Valor em centavos (> 0) }
        description: { type: string, maxLength: 200 }
        date: { type: string, format: date-time, description: Competência }
        due_date: { type: string, format: date-time, nullable: true, description: Vencimento (opcional) }
        paid: { type: boolean }
        notes: { type: string, maxLength: 500 }
        installments: { type: integer, minimum: 1, maximum: 420, description: "Parcelamento: ausente/1 = lançamento único; >1 gera N parcelas (uma por mês)" }
        tag_ids:
          type: array
          description: "IDs de etiquetas da organização a anexar. IDs estrangeiros são ignorados; lista vazia/ausente limpa as etiquetas na atualização"
          items: { type: string, format: uuid }
    SettleRequest:
      type: object
      properties:
        account_id: { type: string, format: uuid, description: Conta de liquidação (opcional) }
        paid_at: { type: string, format: date-time, nullable: true, description: Data da baixa (padrão agora) }
    Transaction:
      type: object
      properties:
        id: { type: string, format: uuid }
        account_id: { type: string, format: uuid }
        credit_card_id: { type: string, format: uuid }
        contact_id: { type: string, format: uuid }
        type: { type: string }
        amount: { type: integer, format: int64 }
        description: { type: string }
        date: { type: string, format: date-time }
        due_date: { type: string, format: date-time, nullable: true }
        paid_at: { type: string, format: date-time, nullable: true }
        paid: { type: boolean }
        recurring: { type: boolean }
        status: { type: string, enum: [open, overdue, paid], description: Status derivado (não persistido) }
        installment_group_id: { type: string, format: uuid, description: ID do grupo de parcelas (omitido quando não parcelado) }
        installment_number: { type: integer, description: Posição da parcela (1-based); omitido quando não parcelado }
        installment_total: { type: integer, description: Total de parcelas do grupo; omitido quando não parcelado }
        notes: { type: string }
        attachment_count: { type: integer, description: "Quantidade de comprovantes anexados (0 quando nenhum)" }
        category: { $ref: '#/components/schemas/Category' }
        contact:
          type: object
          nullable: true
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
        tags:
          type: array
          description: Etiquetas anexadas (omitido quando nenhuma)
          items: { $ref: '#/components/schemas/Tag' }

    Attachment:
      type: object
      properties:
        id: { type: string, format: uuid }
        transaction_id: { type: string, format: uuid }
        file_name: { type: string }
        content_type: { type: string }
        size: { type: integer, format: int64, description: Tamanho em bytes }
        created_at: { type: string, format: date-time }

    PageMeta:
      type: object
      properties:
        page: { type: integer }
        per_page: { type: integer }
        total: { type: integer, format: int64 }
        pages: { type: integer }

    UserMini:
      type: object
      nullable: true
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
    AuditLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        action: { type: string, description: "Método HTTP da ação (POST/PUT/PATCH/DELETE)" }
        entity: { type: string, description: "Recurso afetado (primeiro segmento do path)" }
        entity_id: { type: string, description: "ID do recurso afetado (quando presente na URL)" }
        ip: { type: string, description: Endereço IP de origem }
        user: { $ref: '#/components/schemas/UserMini' }
        metadata: { type: string, description: "Metadados adicionais (JSON serializado)" }

    PayablesSummary:
      type: object
      properties:
        total_open: { type: integer, format: int64, description: Total em aberto (centavos) }
        total_overdue: { type: integer, format: int64, description: Total vencido (centavos) }
        due_next_7d: { type: integer, format: int64, description: A vencer nos próximos 7 dias (centavos) }
        count_open: { type: integer, format: int64, description: Quantidade em aberto }
    PayablesMeta:
      type: object
      properties:
        page: { type: integer }
        per_page: { type: integer }
        total: { type: integer, format: int64 }
        pages: { type: integer }
        summary: { $ref: '#/components/schemas/PayablesSummary' }

    ForecastResponse:
      type: object
      properties:
        current_balance: { type: integer, format: int64, description: Saldo atual (centavos) }
        months:
          type: array
          items: { $ref: '#/components/schemas/ForecastMonth' }
        end_balance: { type: integer, format: int64 }
        lowest: { $ref: '#/components/schemas/ForecastLowest' }
        alerts:
          type: array
          items: { $ref: '#/components/schemas/ForecastAlert' }
    ForecastMonth:
      type: object
      properties:
        month: { type: string, example: "2026-06" }
        inflow: { type: integer, format: int64 }
        outflow: { type: integer, format: int64 }
        net: { type: integer, format: int64 }
        projected_balance: { type: integer, format: int64 }
    ForecastLowest:
      type: object
      properties:
        month: { type: string, example: "2026-06" }
        balance: { type: integer, format: int64 }
    ForecastAlert:
      type: object
      properties:
        month: { type: string, example: "2026-06" }
        message: { type: string, example: "Saldo projetado negativo em junho/2026" }

    DashboardResponse:
      type: object
      properties:
        balance: { type: integer, format: int64 }
        month_income: { type: integer, format: int64 }
        month_expense: { type: integer, format: int64 }
        month_net: { type: integer, format: int64 }
        upcoming_bills:
          type: array
          items: { $ref: '#/components/schemas/Transaction' }
        cash_flow:
          type: array
          items: { $ref: '#/components/schemas/CashFlowPoint' }
        top_categories:
          type: array
          items: { $ref: '#/components/schemas/CategorySpend' }
        accounts_summary:
          type: array
          items: { $ref: '#/components/schemas/Account' }
    CashFlowPoint:
      type: object
      properties:
        month: { type: string, example: "2026-05" }
        income: { type: integer, format: int64 }
        expense: { type: integer, format: int64 }
    CategorySpend:
      type: object
      properties:
        category_id: { type: string, format: uuid }
        name: { type: string }
        color: { type: string }
        total: { type: integer, format: int64 }

    CreditCardRequest:
      type: object
      required: [name, closing_day, due_day]
      properties:
        name: { type: string, maxLength: 120 }
        limit: { type: integer, format: int64, description: Limite em centavos }
        closing_day: { type: integer, minimum: 1, maximum: 28 }
        due_day: { type: integer, minimum: 1, maximum: 28 }
        color: { type: string }
    CreditCard:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        limit: { type: integer, format: int64 }
        closing_day: { type: integer }
        due_day: { type: integer }
        color: { type: string }
        used: { type: integer, format: int64, description: Soma das despesas não pagas do cartão (centavos) }
        available: { type: integer, format: int64, description: limit - used }

    Invoice:
      type: object
      description: >
        Fatura (ciclo de faturamento) de um cartão, calculada agrupando os
        lançamentos do cartão por referência de fechamento. Não é persistida.
      properties:
        reference: { type: string, example: "2026-05", description: Ano-mês do fechamento (YYYY-MM) }
        period_start: { type: string, format: date-time, description: Dia seguinte ao fechamento anterior }
        period_end: { type: string, format: date-time, description: Data de fechamento }
        due_date: { type: string, format: date-time, description: Vencimento da fatura }
        total: { type: integer, format: int64, description: Soma das despesas do ciclo (centavos) }
        paid_total: { type: integer, format: int64, description: Soma das parcelas pagas (centavos) }
        open_total: { type: integer, format: int64, description: total - paid_total }
        status: { type: string, enum: [open, closed, paid, overdue], description: open=ciclo atual; closed=fechada não paga; paid=tudo pago; overdue=fechada, vencida e não paga }
        transaction_count: { type: integer }
    InvoiceDetail:
      type: object
      properties:
        invoice: { $ref: '#/components/schemas/Invoice' }
        transactions:
          type: array
          items: { $ref: '#/components/schemas/Transaction' }
    InvoicePayRequest:
      type: object
      required: [account_id]
      properties:
        account_id: { type: string, format: uuid, description: Conta pagadora (validada na org) }
        paid_at: { type: string, format: date-time, nullable: true, description: Data do pagamento (padrão agora) }

    GoalRequest:
      type: object
      required: [name, target_amount]
      properties:
        name: { type: string, maxLength: 120 }
        target_amount: { type: integer, format: int64, description: Valor alvo em centavos (> 0) }
        current_amount: { type: integer, format: int64 }
        deadline: { type: string, format: date-time, nullable: true }
        color: { type: string }
    Goal:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        target_amount: { type: integer, format: int64 }
        current_amount: { type: integer, format: int64 }
        deadline: { type: string, format: date-time, nullable: true }
        color: { type: string }
        progress: { type: number, format: float, description: current/target entre 0 e 1 }

    SearchNamed:
      type: object
      description: Resultado mínimo (id + nome) para grupos da busca global
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    SearchResult:
      type: object
      properties:
        query: { type: string, description: Termo de busca ecoado }
        total: { type: integer, description: Soma do tamanho de todos os grupos }
        results:
          type: object
          properties:
            transactions:
              type: array
              items: { $ref: '#/components/schemas/Transaction' }
            contacts:
              type: array
              items: { $ref: '#/components/schemas/Contact' }
            categories:
              type: array
              items: { $ref: '#/components/schemas/Category' }
            accounts:
              type: array
              items: { $ref: '#/components/schemas/Account' }
            credit_cards:
              type: array
              items: { $ref: '#/components/schemas/SearchNamed' }
            goals:
              type: array
              items: { $ref: '#/components/schemas/SearchNamed' }

    BudgetRequest:
      type: object
      required: [category_id, amount, month, year]
      properties:
        category_id: { type: string, format: uuid, description: Categoria de despesa da organização }
        amount: { type: integer, format: int64, description: Teto em centavos (> 0) }
        month: { type: integer, minimum: 1, maximum: 12 }
        year: { type: integer, minimum: 2000, maximum: 2100 }
    Budget:
      type: object
      properties:
        id: { type: string, format: uuid }
        category_id: { type: string, format: uuid }
        category: { $ref: '#/components/schemas/Category' }
        amount: { type: integer, format: int64 }
        month: { type: integer }
        year: { type: integer }
        spent: { type: integer, format: int64, description: Despesa paga na categoria no mês/ano (centavos) }
        percent: { type: number, format: float, description: spent/amount }

    Member:
      type: object
      properties:
        id: { type: string, format: uuid, description: ID da associação (membership) }
        user: { $ref: '#/components/schemas/User' }
        role: { type: string, enum: [owner, admin, member, viewer] }
    UpdateMemberRequest:
      type: object
      required: [role]
      properties:
        role: { type: string, enum: [owner, admin, member, viewer] }

    InvitationRequest:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email }
        role: { type: string, enum: [admin, member, viewer] }
    Invitation:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        role: { type: string }
        accepted: { type: boolean }
        token: { type: string, description: Token do convite (retornado apenas na criação) }
        created_at: { type: string, format: date-time }
    AcceptInvitationRequest:
      type: object
      required: [token]
      properties:
        token: { type: string }

    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        title: { type: string }
        message: { type: string }
        read: { type: boolean }
        created_at: { type: string, format: date-time }

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token: { type: string }
        password: { type: string, minLength: 8, maxLength: 72 }

    BulkResult:
      type: object
      properties:
        updated: { type: integer, format: int64, description: Quantidade de registros afetados }
    BulkSettleRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
        account_id: { type: string, format: uuid, description: Conta de liquidação (opcional) }
        paid_at: { type: string, format: date-time, nullable: true, description: Data da baixa (padrão agora) }
    BulkIDsRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
    BulkCategorizeRequest:
      type: object
      required: [ids, category_id]
      properties:
        ids:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
        category_id: { type: string, format: uuid }

    Session:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_agent: { type: string }
        ip: { type: string }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
    RevokeOtherSessionsRequest:
      type: object
      properties:
        keep_refresh_token: { type: string, description: Refresh token bruto da sessão atual a preservar (opcional) }

    ReportSummary:
      type: object
      properties:
        income: { type: integer, format: int64, description: Receitas do período (centavos) }
        expense: { type: integer, format: int64, description: Despesas do período (centavos) }
        net: { type: integer, format: int64, description: income - expense }
        by_category:
          type: array
          items: { $ref: '#/components/schemas/ReportCategoryTotal' }
        by_month:
          type: array
          items: { $ref: '#/components/schemas/ReportMonthTotal' }
    ReportCategoryTotal:
      type: object
      properties:
        category_id: { type: string, format: uuid }
        name: { type: string }
        color: { type: string }
        kind: { type: string, enum: [income, expense] }
        total: { type: integer, format: int64 }
    ReportMonthTotal:
      type: object
      properties:
        month: { type: string, example: "2026-05" }
        income: { type: integer, format: int64 }
        expense: { type: integer, format: int64 }
