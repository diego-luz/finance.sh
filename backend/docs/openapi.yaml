      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: Arquivo PDF
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /reports/monthly.pdf:
    get:
      tags: [Reports]
      summary: Resumo mensal em PDF
      description: >
        PDF com receitas x despesas do mês, maiores categorias de despesa e as
        listas de contas pagas e a vencer. Sem `month`/`year` usa o mês corrente.
      parameters:
        - { name: month, in: query, schema: { type: integer, minimum: 1, maximum: 12 } }
        - { name: year, in: query, schema: { type: integer } }
      responses:
        '200':
          description: Arquivo PDF
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /export/data.xlsx:
    get:
      tags: [Reports]
      summary: Exporta os dados da organização em planilha (.xlsx)
      description: >
        Planilha com abas Transações, Contas, Categorias, Contatos, ContasAPagar
        e ContasAReceber. Valores em reais. Escopo da organização ativa.
      responses:
        '200':
          description: Arquivo XLSX
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }

  /transactions/bulk-settle:
