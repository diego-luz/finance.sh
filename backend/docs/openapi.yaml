openapi: 3.0.3
info:
  title: finance.sh API
  description: >
    API REST do finance.sh — app de controle financeiro open-source, self-hosted e
    multi-organização (row-level por `org_id`). Servida pelo mesmo binário Go que
    embute a SPA. Todas as respostas usam um envelope padrão
    `{ success, data, error, meta }`. Endpoints protegidos exigem um token JWT
    (Authorization: Bearer) e o cabeçalho `X-Organization-ID` para selecionar a
    organização ativa (rotas tenant-agnósticas como setup, /me e POST
    /organizations dispensam o cabeçalho).
  version: 1.0.0
servers:
  - url: /api/v1
    description: Base path da API

tags:
  - name: Setup
    description: >
      Configuração inicial (first-boot). Quando o banco está vazio a SPA cai em
      `/setup` para o operador criar o primeiro super-admin + organização. Rotas
      públicas, sem autenticação; `initialize` é idempotente (2ª chamada = 409).
  - name: Auth
    description: Cadastro, login e gestão de sessão
  - name: Accounts
    description: Contas financeiras
  - name: Categories
    description: Categorias de receitas e despesas
  - name: Categorization
    description: Categorização automática (regras + histórico)
  - name: Transactions
    description: Lançamentos financeiros
  - name: Attachments
    description: Comprovantes (anexos) de lançamentos
  - name: Contacts
    description: Clientes e fornecedores
  - name: Tags
    description: Etiquetas (rótulos) de lançamentos
  - name: Search
    description: Busca global multi-domínio
  - name: Payables
    description: Contas a pagar e a receber
  - name: Dashboard
    description: Visão consolidada
  - name: Forecast
    description: Projeção de fluxo de caixa
  - name: System
    description: Saúde do serviço
  - name: CreditCards
    description: Cartões de crédito
  - name: Goals
    description: Metas de economia
  - name: Budgets
    description: Orçamentos mensais por categoria
  - name: Organization
    description: Configuração da organização ativa (nome, moeda) e moedas suportadas
  - name: Members
    description: Membros e papéis da organização
  - name: Invitations
    description: Convites de novos membros
  - name: Notifications
    description: Alertas in-app
  - name: Reports
    description: Exportações
  - name: Imports
    description: Importação de extratos bancários (OFX/CSV)
  - name: Recurrences
    description: Lançamentos recorrentes (motor de recorrência)
  - name: Account
    description: Autogestão da conta (2FA e direitos LGPD)
  - name: Auditoria
    description: Trilha de auditoria (ações sensíveis; somente owner/admin)
  - name: Admin
    description: >
      Back-office da plataforma (super-administrador). Endpoints platform-wide,
      NÃO escopados por tenant: exigem Authorization Bearer de um usuário com
      super_admin=true e não usam o cabeçalho X-Organization-ID.

security:
  - bearerAuth: []
    orgHeader: []

paths:
  /health:
    get:
      tags: [System]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Serviço operante
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, example: ok }

  /setup/status:
    get:
      tags: [Setup]
      summary: Indica se a instância precisa de configuração inicial
      description: "Retorna `needs_setup=true` enquanto não houver nenhum usuário no banco. Rota pública usada pela SPA para redirecionar a `/setup`."
      security: []
      responses:
        '200':
          description: Estado do setup
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          needs_setup: { type: boolean }

  /setup/initialize:
    post:
      tags: [Setup]
      summary: Cria o primeiro super-admin + organização (first-boot)
      description: >
        Idempotente por design: a criação é protegida por uma transação com guarda
        `count(users) == 0`. Se já existir qualquer usuário retorna 409
        (already_initialized). Cria o usuário como super-admin com a senha escolhida
        pelo operador (sem segredo gerado/exibido), a organização, a associação de
        proprietário e semeia categorias/contas padrão. Não exige autenticação.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetupInitializeRequest' }
      responses:
        '201':
          description: Plataforma inicializada (retorna sessão já autenticada)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthEnvelope' }
        '409':
          description: A plataforma já foi inicializada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/register:
    post:
      tags: [Auth]
      summary: Cadastra usuário e cria organização
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: Conta criada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthEnvelope' }
        '409':
          description: E-mail já cadastrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '403':
          description: Cadastro fechado (registration_closed) — assinatura desativada pelo administrador
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/registration-open:
    get:
      tags: [Auth]
      summary: Indica se o cadastro público está aberto
      description: >
        Flag pública para o frontend ocultar a tela de cadastro quando o
        registro self-service estiver desativado (REGISTRATION_OPEN=false).
      security: []
      responses:
        '200':
          description: Estado do cadastro público
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          open: { type: boolean }

  /auth/login:
    post:
      tags: [Auth]
      summary: Autentica e emite tokens
      description: >
        Quando o usuário tem 2FA ativado, a resposta NÃO contém tokens: retorna
        `{ mfa_required: true, mfa_token }`. O cliente deve então chamar
        `/auth/2fa/verify` com o `mfa_token` e o código TOTP (ou de recuperação).
        Após 5 tentativas falhas o e-mail é bloqueado por 15 minutos (HTTP 423).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Autenticado, ou desafio de 2FA
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthEnvelope'
                  - allOf:
                      - $ref: '#/components/schemas/Envelope'
                      - properties:
                          data: { $ref: '#/components/schemas/MFAChallenge' }
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '403':
          description: Conta desativada pelo administrador (account_disabled)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '423':
          description: Conta temporariamente bloqueada por excesso de tentativas
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/2fa/verify:
    post:
      tags: [Auth]
      summary: Conclui o login com o segundo fator
      description: Troca o `mfa_token` + código TOTP (ou de recuperação) por uma sessão completa.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TwoFactorVerifyRequest' }
      responses:
        '200':
          description: Autenticado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthEnvelope' }
        '401':
          description: Token ou código inválido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotaciona o refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: Novo par de tokens
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthEnvelope' }
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoga o refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '204': { description: Sessão encerrada }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Solicita redefinição de senha
      description: >
        Sempre retorna 200 com mensagem genérica (não revela se o e-mail existe —
        anti-enumeração). O token NUNCA volta no corpo da resposta; quando SMTP
        está configurado o link vai por e-mail, caso contrário é escrito no log do
        servidor (`docker compose logs app`). O flag `data.email_sent` reflete se a
        instância tem SMTP (nível de instância, não revela se a conta existe) — o
        frontend usa para mostrar "verifique o e-mail" ou "o servidor não envia
        e-mail, veja o log / use o comando de reset / peça ao administrador".
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotPasswordRequest' }
      responses:
        '200':
          description: Solicitação processada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          message: { type: string }
                          email_sent: { type: boolean, description: "true se a instância tem SMTP configurado (link foi enviado por e-mail); false = link só no log do servidor / via CLI" }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Redefine a senha usando o token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResetPasswordRequest' }
      responses:
        '200':
          description: Senha redefinida
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '400':
          description: Token inválido ou expirado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Confirma o e-mail (verificação suave)
      description: A verificação NÃO bloqueia o login; apenas marca o e-mail como verificado.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VerifyEmailRequest' }
      responses:
        '200':
          description: E-mail verificado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '400':
          description: Token inválido ou expirado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/verify-email/resend:
    post:
      tags: [Auth]
      summary: Reenvia o link de verificação
      description: Sempre retorna 200 genérico (não revela existência/estado do e-mail).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResendVerificationRequest' }
      responses:
        '200':
          description: Solicitação processada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /me:
    get:
      tags: [Auth]
      summary: Usuário autenticado e suas organizações
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/MeResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/2fa/setup:
    post:
      tags: [Account]
      summary: Inicia configuração do 2FA (TOTP)
      description: Gera um segredo TOTP pendente (ainda não ativo) e retorna o otpauth_url para QR code.
      responses:
        '200':
          description: Segredo gerado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/TwoFactorSetup' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/2fa/enable:
    post:
      tags: [Account]
      summary: Ativa o 2FA validando um código TOTP
      description: Retorna 8 códigos de recuperação de uso único (exibidos apenas uma vez).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TwoFactorCodeRequest' }
      responses:
        '200':
          description: 2FA ativado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/TwoFactorEnable' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /me/2fa/disable:
    post:
      tags: [Account]
      summary: Desativa o 2FA
      description: Exige um código TOTP atual ou um código de recuperação válido.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TwoFactorCodeRequest' }
      responses:
        '200':
          description: 2FA desativado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /me/export:
    get:
      tags: [Account]
      summary: Exporta todos os dados do usuário (LGPD)
      description: >
        Retorna um documento JSON com o perfil, organizações, dados financeiros e
        logs de auditoria do usuário, como anexo
        (`Content-Disposition: attachment; filename="finance-sh-meus-dados.json"`).
      responses:
        '200':
          description: Documento JSON com os dados do usuário
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/import:
    post:
      tags: [Account]
      summary: Importa dados de um export para uma NOVA organização
      description: >
        Recebe o JSON gerado por `GET /me/export` e restaura o conteúdo financeiro
        numa organização NOVA, da qual o usuário autenticado vira proprietário (não
        sobrescreve dados existentes). Os UUIDs antigos são remapeados para novos
        preservando as relações (FKs). Importa contas, categorias, contatos,
        cartões, orçamentos, metas e lançamentos; ignora notificações e auditoria.
        Tudo numa transação. Corpo = JSON cru (não multipart), limite de 25 MB.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, description: "Documento exportado por /me/export" }
      responses:
        '201':
          description: Dados importados; resumo por entidade
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/DataImportSummary' }
        '400':
          description: JSON inválido ou vazio
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { description: Corpo acima de 25 MB }

  /me/account:
    delete:
      tags: [Account]
      summary: Remove/anonimiza a conta (LGPD — direito ao esquecimento)
      description: >
        Exige a senha atual. Soft-deleta os dados financeiros e as organizações
        das quais o usuário é o único dono, remove vínculos, anonimiza o usuário e
        revoga todas as sessões.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeleteAccountRequest' }
      responses:
        '200':
          description: Conta removida/anonimizada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '401':
          description: Senha incorreta ou não autenticado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /accounts:
    get:
      tags: [Accounts]
      summary: Lista contas com saldo calculado
      responses:
        '200':
          description: Lista de contas
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Account' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Accounts]
      summary: Cria conta
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccountRequest' }
      responses:
        '201':
          description: Conta criada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Account' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /accounts/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Accounts]
      summary: Detalha conta
      responses:
        '200':
          description: Conta
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Account' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Accounts]
      summary: Atualiza conta
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccountRequest' }
      responses:
        '200':
          description: Conta atualizada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Account' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Accounts]
      summary: Remove conta
      responses:
        '204': { description: Removida }
        '404': { $ref: '#/components/responses/NotFound' }

  /categories:
    get:
      tags: [Categories]
      summary: Lista categorias
      responses:
        '200':
          description: Lista de categorias
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Category' }
    post:
      tags: [Categories]
      summary: Cria categoria
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryRequest' }
      responses:
        '201':
          description: Categoria criada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Category' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /categories/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Categories]
      summary: Detalha categoria
      responses:
        '200':
          description: Categoria
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Category' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Categories]
      summary: Atualiza categoria
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryRequest' }
      responses:
        '200':
          description: Categoria atualizada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Category' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Categories]
      summary: Remove categoria
      responses:
        '204': { description: Removida }
        '404': { $ref: '#/components/responses/NotFound' }

  /categorization/rules:
    get:
      tags: [Categorization]
      summary: Lista as regras de categorização automática
      responses:
        '200':
          description: Lista de regras (maior prioridade primeiro)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/CategoryRule' }
    post:
      tags: [Categorization]
      summary: Cria uma regra de categorização
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryRuleRequest' }
      responses:
        '201':
          description: Regra criada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/CategoryRule' }
        '422': { description: Regra inválida (categoria inexistente ou regex que não compila) }

  /categorization/rules/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    put:
      tags: [Categorization]
      summary: Atualiza uma regra de categorização
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryRuleRequest' }
      responses:
        '200':
          description: Regra atualizada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/CategoryRule' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { description: Regra inválida }
    delete:
      tags: [Categorization]
      summary: Remove uma regra de categorização
      responses:
        '204': { description: Removida }
        '404': { $ref: '#/components/responses/NotFound' }

  /categorization/apply:
    post:
      tags: [Categorization]
      summary: Aplica as regras às transações sem categoria
      description: >
        Percorre as transações da organização sem categoria, resolve uma
        categoria (regras + histórico) e a atribui. Retorna a quantidade
        atualizada.
      responses:
        '200':
          description: Quantidade de transações categorizadas
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/ApplyResult' }

  /categorization/suggest:
    get:
      tags: [Categorization]
      summary: Sugere uma categoria para uma descrição
      description: >
        Resolve uma categoria para a descrição informada: primeiro pelas regras
        (maior prioridade), depois pelo histórico (categoria mais usada em
        transações passadas com token significativo). `source` indica a origem.
      parameters:
        - { name: description, in: query, required: true, schema: { type: string } }
        - { name: type, in: query, required: true, schema: { type: string, enum: [income, expense] } }
      responses:
        '200':
          description: Sugestão de categoria
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/SuggestResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /recurrences:
    get:
      tags: [Recurrences]
      summary: Lista as regras de recorrência
      description: >
        Lista as regras de lançamentos recorrentes da organização, ordenadas
        pela próxima data de execução (next_run_date). Disponível a qualquer
        membro.
      responses:
        '200':
          description: Lista de regras (próxima execução primeiro)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/RecurrenceRule' }
    post:
      tags: [Recurrences]
      summary: Cria uma regra de recorrência
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecurrenceRuleRequest' }
      responses:
        '201':
          description: Regra criada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/RecurrenceRule' }
        '422': { description: Regra inválida (conta/categoria/contato inexistente, frequência ou intervalo inválidos) }

  /recurrences/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    put:
      tags: [Recurrences]
      summary: Atualiza uma regra de recorrência
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecurrenceRuleRequest' }
      responses:
        '200':
          description: Regra atualizada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/RecurrenceRule' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { description: Regra inválida }
    delete:
      tags: [Recurrences]
      summary: Remove uma regra de recorrência
      responses:
        '204': { description: Removida }
        '404': { $ref: '#/components/responses/NotFound' }

  /recurrences/{id}/run:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      tags: [Recurrences]
      summary: Gera agora as ocorrências pendentes de uma regra
      description: >
        Materializa imediatamente os lançamentos que a regra deve até a data
        atual, avançando o cursor (next_run_date). Idempotente. Retorna quantos
        lançamentos foram criados.
      responses:
        '200':
          description: Quantidade de lançamentos gerados
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/RecurrenceRunResult' }
        '404': { $ref: '#/components/responses/NotFound' }

  /contacts:
    get:
      tags: [Contacts]
      summary: Lista contatos (clientes/fornecedores)
      responses:
        '200':
          description: Lista de contatos
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Contact' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Contacts]
      summary: Cria contato
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactRequest' }
      responses:
        '201':
          description: Contato criado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Contact' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /contacts/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Contacts]
      summary: Detalha contato
      responses:
        '200':
          description: Contato
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Contact' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Contacts]
      summary: Atualiza contato
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactRequest' }
      responses:
        '200':
          description: Contato atualizado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Contact' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Contacts]
      summary: Remove contato
      responses:
        '204': { description: Removido }
        '404': { $ref: '#/components/responses/NotFound' }

  /tags:
    get:
      tags: [Tags]
      summary: Lista etiquetas
      responses:
        '200':
          description: Lista de etiquetas
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Tag' }
    post:
      tags: [Tags]
      summary: Cria etiqueta
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TagRequest' }
      responses:
        '201':
          description: Etiqueta criada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Tag' }
        '409':
          description: Já existe uma etiqueta com este nome na organização
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /tags/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    put:
      tags: [Tags]
      summary: Atualiza etiqueta
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TagRequest' }
      responses:
        '200':
          description: Etiqueta atualizada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Tag' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Já existe uma etiqueta com este nome na organização
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Tags]
      summary: Remove etiqueta (limpa também as associações)
      responses:
        '204': { description: Removida }
        '404': { $ref: '#/components/responses/NotFound' }

  /search:
    get:
      tags: [Search]
      summary: Busca global (org-scoped) em vários domínios
      parameters:
        - { name: q, in: query, schema: { type: string }, description: Termo de busca (ILIKE, case-insensitive). Vazio retorna grupos vazios }
        - { name: limit, in: query, schema: { type: integer, default: 5, minimum: 1, maximum: 20 }, description: Máximo de itens por grupo }
      responses:
        '200':
          description: Resultados agrupados por domínio
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/SearchResult' }

  /transactions:
    get:
      tags: [Transactions]
      summary: Lista lançamentos (com filtros e paginação)
      parameters:
        - { name: type, in: query, schema: { type: string, enum: [income, expense, transfer] } }
        - { name: account_id, in: query, schema: { type: string, format: uuid } }
        - { name: category_id, in: query, schema: { type: string, format: uuid } }
        - { name: contact_id, in: query, schema: { type: string, format: uuid } }
        - { name: tag_id, in: query, schema: { type: string, format: uuid }, description: Filtra por etiqueta anexada }
        - { name: from, in: query, schema: { type: string, format: date }, description: Data inicial (YYYY-MM-DD ou RFC3339) }
        - { name: to, in: query, schema: { type: string, format: date }, description: Data final (YYYY-MM-DD ou RFC3339) }
        - { name: search, in: query, schema: { type: string }, description: Busca na descrição }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        '200':
          description: Página de lançamentos
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Transaction' }
                      meta: { $ref: '#/components/schemas/PageMeta' }
    post:
      tags: [Transactions]
      summary: Cria lançamento
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransactionRequest' }
      responses:
        '201':
          description: Lançamento criado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Transaction' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /transactions/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Transactions]
      summary: Detalha lançamento
      responses:
        '200':
          description: Lançamento
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Transaction' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Transactions]
      summary: Atualiza lançamento
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransactionRequest' }
      responses:
        '200':
          description: Lançamento atualizado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Transaction' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Transactions]
      summary: Remove lançamento
      description: >
        Com scope=all, e quando o lançamento pertence a um grupo de parcelas,
        remove o grupo inteiro; scope=one (padrão) remove apenas este lançamento.
      parameters:
        - { name: scope, in: query, schema: { type: string, enum: [one, all], default: one } }
      responses:
        '204': { description: Removido }
        '404': { $ref: '#/components/responses/NotFound' }

  /transactions/{id}/settle:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      tags: [Transactions]
      summary: Dá baixa (quita) um lançamento
      description: >
        Marca o lançamento como pago, registrando paid_at (padrão agora) e,
        opcionalmente, movendo-o para outra conta (account_id, validada na org).
        O corpo é opcional.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SettleRequest' }
      responses:
        '200':
          description: Lançamento quitado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Transaction' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /transactions/{id}/unsettle:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      tags: [Transactions]
      summary: Estorna a baixa de um lançamento
      description: Reverte a quitação (paid=false, paid_at=null).
      responses:
        '200':
          description: Baixa estornada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Transaction' }
        '404': { $ref: '#/components/responses/NotFound' }

  /transactions/{id}/attachments:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Attachments]
      summary: Lista comprovantes do lançamento
      responses:
        '200':
          description: Lista de comprovantes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Attachment' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Attachments]
      summary: Anexa um comprovante ao lançamento
      description: >
        Envia um arquivo (multipart/form-data, campo `file`). Tipos aceitos:
        image/jpeg, image/png, image/webp, image/gif e application/pdf. Tamanho
        máximo configurável (ATTACHMENT_MAX_MB, padrão 10MB).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Arquivo do comprovante
      responses:
        '201':
          description: Comprovante anexado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Attachment' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413': { description: Arquivo excede o tamanho máximo permitido }
        '422': { description: Tipo de arquivo não suportado }
        '503': { description: Armazenamento de arquivos indisponível }

  /attachments/{id}/download:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Attachments]
      summary: Baixa o conteúdo do comprovante
      description: >
        Retorna os bytes do arquivo com Content-Type e
        Content-Disposition: attachment. Escopo por organização.
      responses:
        '200':
          description: Conteúdo do arquivo
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Armazenamento de arquivos indisponível }

  /attachments/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    delete:
      tags: [Attachments]
      summary: Remove um comprovante
      responses:
        '204': { description: Removido }
        '404': { $ref: '#/components/responses/NotFound' }

  /imports/preview:
    post:
      tags: [Imports]
      summary: Pré-visualiza um extrato (OFX/CSV) sem persistir
      description: >
        Recebe um arquivo de extrato (multipart/form-data, campo `file`),
        analisa-o e retorna os lançamentos detectados com sinalização de
        duplicidade — nada é gravado. O frontend revisa/edita e envia os
        lançamentos mantidos para `/imports/commit`. Os campos `delimiter`,
        `has_header`, `date_col`, `desc_col`, `amount_col`, `date_format` e
        `decimal_sep` ajustam a leitura de CSV (colunas com índice 0; -1/ausente
        = autodetecção pelo cabeçalho). Tamanho máximo configurável
        (ATTACHMENT_MAX_MB, padrão 10MB).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, account_id]
              properties:
                file:
                  type: string
                  format: binary
                  description: Arquivo do extrato (OFX 1.x/2.x ou CSV)
                account_id:
                  type: string
                  format: uuid
                  description: Conta de destino
                format:
                  type: string
                  enum: [auto, ofx, csv]
                  default: auto
                delimiter:
                  type: string
                  description: "Separador CSV (';' ou ','); autodetecta quando ausente"
                has_header:
                  type: string
                  enum: ['true', 'false']
                  description: "'true' quando a primeira linha do CSV é cabeçalho"
                date_col: { type: integer, description: Índice 0-based da coluna de data (-1 = autodetecta) }
                desc_col: { type: integer, description: Índice 0-based da descrição (-1 = autodetecta) }
                amount_col: { type: integer, description: Índice 0-based do valor (-1 = autodetecta) }
                date_format: { type: string, description: "Layout Go da data (ex.: 02/01/2006)" }
                decimal_sep: { type: string, description: "Separador decimal (',' BR ou '.')" }
      responses:
        '200':
          description: Lançamentos detectados
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/ImportPreview' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '413': { description: Arquivo excede o tamanho máximo permitido }
        '422': { description: Conta inválida, formato não suportado ou arquivo vazio }

  /imports/commit:
    post:
      tags: [Imports]
      summary: Grava os lançamentos revisados de um extrato
      description: >
        Persiste os lançamentos selecionados como transações pagas (paid=true)
        na conta informada, numa única transação de banco. Duplicidades (por
        `external_id`) são reverificadas e ignoradas. A `category_id` opcional
        (validada na organização) é aplicada a todos os lançamentos.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImportCommitRequest' }
      responses:
        '200':
          description: Resultado da gravação
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/ImportCommitResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { description: Validação, conta/categoria inválida ou lista vazia }

  /payables:
    get:
      tags: [Payables]
      summary: Contas a pagar (despesas) com resumo
      description: >
        Lista despesas filtradas por status de pagamento e janela de vencimento.
        O envelope `meta` traz a paginação e um objeto `summary` com os totais.
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [open, overdue, paid, all], default: open } }
        - { name: from, in: query, schema: { type: string, format: date }, description: Vencimento inicial }
        - { name: to, in: query, schema: { type: string, format: date }, description: Vencimento final }
        - { name: contact_id, in: query, schema: { type: string, format: uuid } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        '200':
          description: Página de contas a pagar
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Transaction' }
                      meta: { $ref: '#/components/schemas/PayablesMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /receivables:
    get:
      tags: [Payables]
      summary: Contas a receber (receitas) com resumo
      description: >
        Lista receitas filtradas por status de pagamento e janela de vencimento.
        Mesma forma de `/payables`.
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [open, overdue, paid, all], default: open } }
        - { name: from, in: query, schema: { type: string, format: date }, description: Vencimento inicial }
        - { name: to, in: query, schema: { type: string, format: date }, description: Vencimento final }
        - { name: contact_id, in: query, schema: { type: string, format: uuid } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        '200':
          description: Página de contas a receber
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Transaction' }
                      meta: { $ref: '#/components/schemas/PayablesMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /cashflow/forecast:
    get:
      tags: [Forecast]
      summary: Projeção de fluxo de caixa
      description: >
        Projeta o saldo para os próximos N meses (1..12, padrão 3) a partir do
        saldo atual, das contas a pagar/receber não quitadas e dos lançamentos
        recorrentes.
      parameters:
        - { name: months, in: query, schema: { type: integer, default: 3, minimum: 1, maximum: 12 } }
      responses:
        '200':
          description: Projeção mensal
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/ForecastResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Visão consolidada do mês
      responses:
        '200':
          description: Dados do dashboard
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/DashboardResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /credit-cards:
    get:
      tags: [CreditCards]
      summary: Lista cartões com uso/limite disponível
      responses:
        '200':
          description: Lista de cartões
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/CreditCard' }
    post:
      tags: [CreditCards]
      summary: Cria cartão
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreditCardRequest' }
      responses:
        '201':
          description: Cartão criado
          content:
            application/json:
