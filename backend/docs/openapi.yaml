  /members:
    get:
      tags: [Members]
      summary: Lista membros da organização (owner/admin)
      responses:
        '200':
          description: Lista de membros
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Member' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /members/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    put:
      tags: [Members]
      summary: Altera o papel de um membro (owner/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateMemberRequest' }
      responses:
        '200':
          description: Papel atualizado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Member' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Não é possível rebaixar o último proprietário
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
    delete:
      tags: [Members]
      summary: Remove um membro (owner/admin)
      responses:
        '204': { description: Removido }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Não é possível remover o último proprietário
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }

  /invitations:
    get:
      tags: [Invitations]
      summary: Lista convites pendentes (owner/admin)
      responses:
        '200':
          description: Convites pendentes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Invitation' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Invitations]
      summary: Cria convite (owner/admin)
      description: Respeita o limite de usuários do plano (membros + convites pendentes).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InvitationRequest' }
      responses:
        '201':
          description: Convite criado (inclui token)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Invitation' }
        '402':
          description: Limite de usuários do plano atingido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /invitations/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    delete:
      tags: [Invitations]
      summary: Revoga convite (owner/admin)
      responses:
        '204': { description: Revogado }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /invitations/accept:
    post:
      tags: [Invitations]
      summary: Aceita um convite (usuário autenticado)
      description: >
        Requer autenticação, mas não exige o cabeçalho X-Organization-ID — a
        organização é resolvida a partir do convite.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AcceptInvitationRequest' }
      responses:
        '200':
          description: Membro criado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Member' }
        '404':
          description: Convite inválido ou já utilizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '409':
          description: Usuário já é membro da organização
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }

  /organization:
    get:
      tags: [Organization]
      summary: Organização ativa (qualquer membro)
      description: Retorna a organização do X-Organization-ID com o papel do solicitante.
      responses:
        '200':
          description: Organização ativa
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Organization' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [Organization]
      summary: Atualiza nome/moeda da organização ativa (owner/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrgUpdateRequest' }
      responses:
        '200':
          description: Organização atualizada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Organization' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: Moeda não suportada ou validação inválida
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }

  /organizations:
    post:
      tags: [Organization]
      summary: Cria uma organização adicional (self-service)
      description: >
        Permite ao usuário autenticado criar outra organização (ex.: separar "Casa"
        de "Microempresa"). O usuário vira proprietário, ganha a associação e a nova
        org recebe o seed de categorias/contas padrão. Rota tenant-agnóstica (não
        exige X-Organization-ID). O frontend troca o contexto para a nova org após
        a criação.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrgRequest' }
      responses:
        '201':
          description: Organização criada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Organization' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /currencies:
    get:
      tags: [Organization]
      summary: Moedas suportadas (qualquer membro)
      description: Tabela estática de moedas ISO-4217 aceitas, com nome em pt-BR e símbolo.
      responses:
        '200':
          description: Lista de moedas
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Currency' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /notifications:
    get:
