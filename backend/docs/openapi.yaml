                      data: { $ref: '#/components/schemas/ReportSummary' }

  /reports/statement.pdf:
    get:
      tags: [Reports]
      summary: Extrato em PDF (estilo bancário)
      description: >
        PDF com cabeçalho (finance.sh + organização + período), tabela de lançamentos
        no intervalo e totais (receitas, despesas, saldo). Sem `from`/`to` usa o
