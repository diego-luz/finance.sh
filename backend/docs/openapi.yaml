      tags: [Reports]
      summary: Dados agregados para a página de Relatórios
      description: >
        Retorna totais de receitas/despesas do período mais quebras por
        categoria e por mês. Sem `from`/`to` usa o mês corrente.
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: Resumo agregado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
