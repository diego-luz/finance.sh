                  - properties:
                      data: { $ref: '#/components/schemas/CreditCard' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /credit-cards/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [CreditCards]
      summary: Detalha cartão
      responses:
        '200':
          description: Cartão
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/CreditCard' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [CreditCards]
      summary: Atualiza cartão
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreditCardRequest' }
      responses:
        '200':
          description: Cartão atualizado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/CreditCard' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [CreditCards]
      summary: Remove cartão
      responses:
        '204': { description: Removido }
        '404': { $ref: '#/components/responses/NotFound' }

  /credit-cards/{id}/invoices:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [CreditCards]
      summary: Lista as faturas recentes do cartão
      description: >
        Agrupa os lançamentos do cartão por referência de fechamento e devolve as
        faturas mais recentes primeiro. Leitura disponível a qualquer membro.
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 12, minimum: 1 } }
      responses:
        '200':
          description: Lista de faturas
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Invoice' }
        '404': { $ref: '#/components/responses/NotFound' }

  /credit-cards/{id}/invoices/{reference}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
      - { name: reference, in: path, required: true, schema: { type: string }, description: Ano-mês do fechamento (YYYY-MM) }
    get:
      tags: [CreditCards]
      summary: Detalha uma fatura e seus lançamentos
      responses:
        '200':
          description: Fatura + lançamentos do ciclo
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/InvoiceDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

  /credit-cards/{id}/invoices/{reference}/pay:
    parameters:
      - $ref: '#/components/parameters/IdParam'
      - { name: reference, in: path, required: true, schema: { type: string }, description: Ano-mês do fechamento (YYYY-MM) }
    post:
      tags: [CreditCards]
      summary: Paga a fatura (quita todos os lançamentos do ciclo)
      description: >
        Marca todos os lançamentos da fatura como pagos, registra paid_at e move-os
        para a conta pagadora (account_id), de modo que o saldo do banco reflita o
        pagamento e o "used" do cartão caia. Requer permissão de escrita.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InvoicePayRequest' }
      responses:
        '200':
          description: Fatura atualizada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Invoice' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /credit-cards/{id}/invoices/{reference}/unpay:
    parameters:
      - $ref: '#/components/parameters/IdParam'
      - { name: reference, in: path, required: true, schema: { type: string }, description: Ano-mês do fechamento (YYYY-MM) }
    post:
      tags: [CreditCards]
      summary: Estorna o pagamento da fatura
      description: Reverte a quitação de todos os lançamentos do ciclo (paid=false).
      responses:
        '200':
          description: Fatura atualizada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Invoice' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /goals:
