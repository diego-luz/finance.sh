                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Goal' }
    post:
      tags: [Goals]
      summary: Cria meta
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GoalRequest' }
      responses:
        '201':
          description: Meta criada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Goal' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /goals/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Goals]
      summary: Detalha meta
      responses:
        '200':
          description: Meta
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Goal' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Goals]
      summary: Atualiza meta
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GoalRequest' }
      responses:
        '200':
          description: Meta atualizada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Goal' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Goals]
      summary: Remove meta
      responses:
        '204': { description: Removida }
        '404': { $ref: '#/components/responses/NotFound' }

  /budgets:
    get:
      tags: [Budgets]
      summary: Lista orçamentos do mês (com gasto e percentual)
      parameters:
        - { name: month, in: query, schema: { type: integer, minimum: 1, maximum: 12 }, description: Mês (padrão atual) }
        - { name: year, in: query, schema: { type: integer }, description: Ano (padrão atual) }
      responses:
        '200':
          description: Lista de orçamentos
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Budget' }
    post:
      tags: [Budgets]
      summary: Cria orçamento
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BudgetRequest' }
      responses:
        '201':
          description: Orçamento criado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Budget' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /budgets/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    put:
      tags: [Budgets]
      summary: Atualiza orçamento
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BudgetRequest' }
      responses:
        '200':
          description: Orçamento atualizado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Budget' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Budgets]
