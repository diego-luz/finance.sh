name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref to save CI minutes on rapid pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Tighten default token. Per-job permissions grant what they actually need.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build & test
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build (api)
        run: |
          go build ./cmd/api
          go build ./...

      - name: Test (race, short)
        run: go test ./... -count=1 -race -short

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api/v1
          VITE_LANDING_URL: http://localhost:8092

  # ---------------------------------------------------------------------------
  # Security scanning
  # ---------------------------------------------------------------------------
  govulncheck:
    name: Go vuln scan (govulncheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: Go SAST (gosec)
    runs-on: ubuntu-latest
    # SAST is advisory: surface findings without blocking the pipeline.
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: "-no-fail -fmt sarif -out gosec.sarif ./backend/..."
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec

  npm-audit-frontend:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit (fail on high+)
        run: npm audit --audit-level=high

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so secrets committed in the past are caught.
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-fs:
    name: Trivy filesystem + config scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Trivy (vuln + misconfig)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: CRITICAL,HIGH
          # Don't break the build on findings; review the SARIF report.
          exit-code: "0"
          format: sarif
          output: trivy-fs.sarif
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ---------------------------------------------------------------------------
  # Docker image — build on every PR (no push), build+push on main.
  # Single full-stack image: the Go binary serves the embedded SPA + API.
  # Tag: ghcr.io/<owner>/finance-sh-app:{latest,sha-<short>}
  # ---------------------------------------------------------------------------
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image prefix and tags
        id: meta
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # Push to GHCR only on pushes to main with GITHUB_TOKEN (packages:write).
      - name: Log in to GHCR
        id: ghcr
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----- app (full-stack: SPA embedded in the Go binary) -----
      # Build context = repo root so the Dockerfile reaches frontend/ + backend/.
      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          load: true
          push: ${{ steps.ghcr.outcome == 'success' }}
          build-args: |
            VITE_API_URL=/api/v1
            VITE_LANDING_URL=http://localhost:8092
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/finance-sh-app:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/finance-sh-app:sha-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      # ----- vuln scan on the built image -----
      - name: Trivy image scan (app)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ghcr.io/${{ steps.meta.outputs.owner }}/finance-sh-app:latest
          severity: CRITICAL,HIGH
          exit-code: "0"
          format: table
